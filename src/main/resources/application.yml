# 文件上传配置
file:
  upload-path: ${user.dir}/uploads  # 使用相对路径
  max-size: 100MB  # 最大文件大小
  allowed-types: # 允许上传的文件类型
    - image/*
    - application/pdf
    - application/msword
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    - application/vnd.ms-excel
    - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
    - application/vnd.ms-powerpoint
    - application/vnd.openxmlformats-officedocument.presentationml.presentation
    - text/*
    - application/zip
    - application/x-rar-compressed

spring:
  servlet:
    multipart:
      max-file-size: 100MB  # 单个文件大小限制
      max-request-size: 100MB  # 总请求大小限制

  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    # 开启消息确认机制
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        # 手动确认消息
        acknowledge-mode: manual
        # 每次从队列获取的消息数量
        prefetch: 1

  # Redis配置
  redis:
    host: localhost
    port: 6379
    password:  # 如果有密码，请设置
    database: 0
    timeout: 10000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

minio:
  endpoint: http://localhost:9005  # MinIO服务地址
  accessKey: admin           # 访问密钥
  secretKey: 12345678           # 密钥
  bucket: z-disk                  # 存储桶名称
